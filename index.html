<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SITE</title>
    <style>
        body {
            background: #000;
            color: #ff0055;
            font-family: 'Impact', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        #status {
            font-size: 20px;
            color: #555;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .mega-button {
            width: 280px;
            height: 280px;
            background: #f00;
            border: 10px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 0 50px #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: 0.2s;
        }

        .active-btn {
            animation: pulse 0.1s infinite;
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 100px #fff !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .flying-word {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px #000;
        }

        #voice-count {
            font-size: 60px;
            margin-top: 20px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="status">НАЖМИ ДЛЯ ЗАПУСКА ЦЕПНОЙ РЕАКЦИИ</div>
    
    <div class="mega-button" id="mainBtn" onclick="startSingularity()">
        ПУСК!
    </div>

    <div id="voice-count">ГОЛОСОВ: 0</div>
    <div style="color: #333; margin-top: 10px;">МСИ В РЕЖИМЕ ПЕРЕГРУЗКИ</div>

    <script>
        let isActive = false;
        let voices = 0;
        const synth = window.speechSynthesis;

        function startSingularity() {
            if (isActive) return;
            isActive = true;
            
            const btn = document.getElementById('mainBtn');
            btn.classList.add('active-btn');
            btn.textContent = "";
            
            // Запускаем бесконечный цикл
            runScreamLoop();
        }

        function runScreamLoop() {
            if (!isActive) return;

            voices++;
            document.getElementById('voice-count').textContent = `ГОЛОСОВ: ${voices}`;

            // Создаем крик
            const msg = new SpeechSynthesisUtterance("хуй");
            msg.lang = 'ru-RU';
            msg.pitch = 1; // Разные тональности для хаоса
            msg.rate = 1.2; // Разная скорость
            msg.volume = 100.0;
            
            synth.speak(msg);

            // Ускоряем интервал появления новых голосов!
            let nextDelay = Math.max(100, 1000 - (voices * 100000)); 
            setTimeout(runScreamLoop, nextDelay);
            
        }


    </script>
</body>
</html>
